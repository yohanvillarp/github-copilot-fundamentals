<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <template id="activity-card-template">
      <div class="activity-card">
        <h3 class="activity-name"></h3>
        <p><strong>Schedule:</strong> <span class="activity-schedule"></span></p>
        <p><strong>Availability:</strong> <span class="activity-spots"></span> spots left</p>
        <div class="participants-section">
          <strong>Participants:</strong>
          <ul class="participants-list"></ul>
        </div>
      </div>
    </template>

    <template id="participant-item-template">
      <li class="participant-item">
        <span class="participant-email"></span>
        <button class="delete-participant-btn" title="Remove participant">&#128465;</button>
      </li>
    </template>

    <template id="no-participants-template">
      <li class="no-participants">No participants yet</li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
